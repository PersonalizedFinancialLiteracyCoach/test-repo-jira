spring:
  application:
    name: identity-service
  profiles:
    active: dev
app:
  open-api:
    description: @project.description@
    title: @project.name@
    version: @project.version@
management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health
  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true
